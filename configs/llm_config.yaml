# LLM provider configuration for the Clarify Engine RAG pipeline.
# Synchronised with docs/standards/embedding-model.md v1.1 and
# docs/audit/data-masking_v1.md v1.2 (BL-04, BL-22, BL-23 — issue #87).
# Updated for MVP/Pilot: OpenRouter priority=1 (free tier), GigaChat priority=2,
# DeepSeek priority=3. Data-residency relaxed to masking+test-mode (issue #89).

use_test_data_mode: true

# --- Temperature lock + decoding parameters (BL-22, FR-08, NFR-06) ------------
# These values are enforced by LLMClient on every provider call. Provider-level
# overrides are honoured only when explicitly present; prompts are NOT allowed
# to override them at runtime. The four keys (temperature, top_p, seed,
# max_tokens) are logged on every classification for audit (FR-08).
decoding:
  temperature: 0.1
  top_p: 0.9
  seed: 42
  max_tokens: 1024

# --- Masking of the RAG channel (BL-04) ---------------------------------------
# Mirror of `mask_rag_context` from embedding_config.yaml — kept here so the
# LLMClient can read the flag without parsing the embedding config.
mask_rag_context: true

# --- UI operation modes (BL-07, issue #93, ADR-004) ---------------------------
# Controls the two-mode Streamlit UI in src/ui/app.py:
#   * "Анализ ТЗ" — stateless batch validation (no history).
#   * "Консультация" — stateful chat with bounded history.
# `max_history_messages` caps the number of past messages forwarded to the LLM
# in consultation mode (3–5× token-cost guard, see CONCEPT §6.8).
ui:
  max_history_messages: 6

# --- Multi-hop retrieval (BL-11, issue #123) ---------------------------------
# Global opt-in is disabled by default. src/ui/app.py hard-locks this feature
# to "Консультация" mode, so batch "Анализ ТЗ" runs keep their one-shot
# retrieval latency even when experiments turn the flag on.
rag:
  multi_hop_enabled: false
  max_hops: 2
  min_confidence_to_stop: 0.8

providers:
  openrouter:
    priority: 1
    model: "qwen/qwen2.5-72b-instruct:free"
    api_key_env: "OPENROUTER_API_KEY"
    allowed_for_production: false  # free tier for MVP tests only
    timeout: "${PROVIDER_TIMEOUT:30}"
    retry_attempts: 2
    fallback_models:
      - "qwen/qwen2.5-72b-instruct:free"
      - "meta-llama/llama-3.3-70b-instruct:free"
      - "google/gemini-2.0-flash-exp:free"
      - "openrouter/free"  # final auto-router

  gigachat:
    priority: 2
    model: "GigaChat-Pro"
    credentials_env: "GIGACHAT_AUTH"
    allowed_for_production: true
    timeout: "${PROVIDER_TIMEOUT:30}"
    retry_attempts: 3
    verify_ssl: false  # for corporate proxies (test)

  deepseek:
    priority: 3
    model: "deepseek-chat"
    api_key_env: "DEEPSEEK_API_KEY"
    allowed_for_production: true  # paid final reserve
    timeout: "${PROVIDER_TIMEOUT:30}"
    retry_attempts: 3

  ollama:
    enabled: true
    priority: 4
    model: "${OLLAMA_MODEL:qwen2.5:7b-instruct-q4_K_M}"
    base_url: "${OLLAMA_BASE_URL:http://localhost:11434}"
    timeout_seconds: "${OLLAMA_TIMEOUT:180}"
    retry_attempts: 2
    options:
      num_ctx: 4096
      num_thread: 0
      keep_alive: "10m"
      temperature: 0.1

fallback_providers:
  - "openrouter"
  - "gigachat"
  - "deepseek"
  - "ollama"
