# Embedding & retrieval configuration for the Clarify Engine RAG pipeline.
# Synchronised with docs/standards/embedding-model.md v1.3 (BL-02, issue #109).
#
# BL-06 (Sprint 2) migrated chunk_size / chunk_overlap from the MVP values
# 250 / 50 to the L1 targets 512 / 64, and enabled section-aware splitting.
# Changing the window size is a BREAKING CHANGE for any pre-existing ChromaDB
# collection — operators must rebuild the index after this change ships.

model_name: "BAAI/bge-m3"
max_length: 512
normalize_embeddings: true

# --- Chunking (BL-06 L1 targets; see RAG_OPTIMIZATION_ANALYSIS.md §3.1) -------
chunk_size: 512
chunk_overlap: 64
min_chunk_size: 384
max_chunk_size: 768

# When `section_aware_chunking: true` the chunker first splits the input on
# heading boundaries (Markdown `#`, dotted numeric sections like `7.3.6`, and
# all-caps PDF headers) before applying the token window. The heading itself
# is preserved at the top of the first chunk of its section so downstream
# metadata (BL-02 section_title / section_number) stays stable.
section_aware_chunking: true

# --- Retrieval ----------------------------------------------------------------
# BL-01: top_k=5 is the production contract for the Streamlit UI → LLM context
# window. rrf_k=60 is the Reciprocal Rank Fusion constant per ADR-001 §4.2.
top_k: 5
rrf_k: 60
use_parent_context: false
parent_context_max_chars: 6000

# --- Query Expansion (BL-12) -------------------------------------------------
# Disabled by default. The UI enables this only in "Консультация" mode so
# batch "Анализ ТЗ" keeps its existing latency and token-cost profile.
rag:
  query_expansion_enabled: false
  expansion_count: 3

# --- STRICT_MODE (BL-03, BL-16a, CONCEPT §7 R-01) -----------------------------
# When `strict_rag_mode: true`, the LLM call is skipped if the retriever
# returns no chunks OR if the top score is below `strict_min_score`. The
# pipeline returns a deterministic "не найдено" fallback instead of letting
# the LLM hallucinate from its weights.
strict_rag_mode: true
strict_min_score: 0.30

# --- Masking of the RAG channel (BL-04, BL-16a, NFR-04 / NFR-05) --------------
# When `mask_rag_context: true`, src/llm/client.py.generate_rag_response
# applies src/llm/masking.py.mask_context_chunks to every retrieved chunk
# before the prompt is built. Disabling this flag is only allowed in offline
# evaluation runs with synthetic data.
mask_rag_context: true

# --- Required chunk metadata schema (BL-02, BL-16a, NFR-02) -------------------
# Every chunk persisted in ChromaDB MUST carry the keys below. The indexer
# (knowledge_base/indexing/build_index.py) enforces this contract; missing
# searchable fields are counted against the ≥ 65 % MVP completeness target.
required_metadata:
  - source
  - chunk_idx
  - page_number
  - section_title
  - section_number
  - product
  - section_inherited

# MVP threshold for the fraction of chunks with complete searchable metadata
# (`source`, `chunk_idx`, `page_number`, `section_title`, `section_number`,
# `product`). The boolean audit flag `section_inherited` is required but is
# not counted as a completeness field because `false` is a valid direct match.
metadata_coverage_min: 0.65

# Section propagation keeps the nearest detected section heading active across
# following chunks/pages from the same document. The page-distance guard resets
# context after long gaps so section metadata cannot bleed into unrelated
# chapters. When no heading has appeared yet, the source filename is used as a
# conservative fallback section label for UI citations and metadata coverage.
section_propagation:
  enabled: true
  max_pages_without_heading: 6
  fallback_to_document_title: true
  fallback_section_number: "document"

vector_store:
  type: "chromadb"
  persist_directory: "./chroma_data"
  collection_name: "clarify_engine_kb"
