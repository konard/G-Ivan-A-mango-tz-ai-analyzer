ui:
  debug_error_details: false
  retrieval:
    # BL-48.6 (issue #184): бизнес-понятные настройки глубины поиска по БЗ.
    # Слайдер в сайдбаре читает все значения отсюда, чтобы тексты и пределы
    # правились без правок в `src/ui/`.
    top_k_min: 1
    top_k_max: 20
    top_k_default: 5
    # Production-лимит NFR-03 (latency): выше — visual warning рядом со слайдером.
    top_k_production_max: 10
    top_k_label: "Макс. число источников для проверки"
    top_k_help: "Глубина поиска: сколько релевантных разделов документации система берёт для КАЖДОГО атомарного требования."
    top_k_tooltip: |
      Этот параметр определяет, сколько релевантных разделов
      документации система будет учитывать при анализе
      КАЖДОГО атомарного требования.

      Пример: если установлено 5, для каждого требования
      из ТЗ система найдёт до 5 наиболее релевантных
      разделов в базе знаний и использует их для
      формирования ответа.

      Если найдено меньше совпадений (например, 3),
      система использует только фактические результаты
      (3 раздела), не создавая искусственных.

      Рекомендация: 3–5 для точных ответов,
      до 10 — для комплексного анализа.
    top_k_warning_template: "⚠️ Значения выше {limit} могут увеличить время обработки и расход токенов."

citations:
  base_url: "http://localhost:8000/docs"
  # base_url: "https://kb.mango-office.ru/docs"
  source_dir: "knowledge_base/sources"
